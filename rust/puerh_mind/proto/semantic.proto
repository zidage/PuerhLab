syntax = "proto3";

package semantic;

service SemanticService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc EmbedText(EmbedTextRequest) returns (EmbeddingResponse);
  rpc EmbedImage(EmbedImageRequest) returns (EmbeddingResponse);
}

message PingRequest {
  string request_id = 1;
}

message PingResponse {
  string request_id = 1;
  string message = 2;
  uint64 elapsed_ms = 3;
}

message EmbedTextRequest {
  string request_id = 1;
  string text = 2;
  string model_name = 3;
}

message EmbedImageRequest {
  string request_id = 1;
  bytes image_bytes = 2;
  string image_format_hint = 3; // e.g. "jpg", "png", "webp"
  string model_name = 4;
}

message EmbeddingResponse {
  string request_id = 1;
  repeated float embedding = 2;
  uint32 dimension = 3;
  string model_name = 4;
  uint64 elapsed_ms = 5;
}
